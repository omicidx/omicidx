repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: dagster-definitions-validate
        name: dagster definitions validate
        entry: uv run --package omicidx-dagster dagster definitions validate -m omicidx.dagster.definitions
        language: system
        pass_filenames: false
        files: ^packages/omicidx-dagster/src/.*\.py$
