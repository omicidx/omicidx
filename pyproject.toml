[tool.uv.workspace]
members = ["packages/*"]

[tool.uv]
dev-dependencies = [
    "duckdb>=1.4.0",
    "sqlglot>=27.0.0",
    "universal-pathlib>=0.2.2",
    "s3fs>=2023.0.0",
    "jupyter>=1.0.0",
    "ruff>=0.9.0",
    "pre-commit>=4.0.0",
    "pytest>=8.0.0",
    "anyio[trio]>=4.0.0",
]

[tool.pytest.ini_options]
addopts = "--import-mode=importlib"
markers = [
    "network: marks tests that require network access (deselect with '-m not network')",
]

[tool.ruff]
target-version = "py311"
line-length = 88

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "C4",   # flake8-comprehensions
]
ignore = [
    "E501",   # line too long — handled by formatter
    "B008",   # do not perform function calls in default arguments (click uses this)
    "SIM108", # ternary operator — sometimes less readable
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["F811"]          # redefinition of unused name (common in pytest fixtures)
"**/cli.py" = ["E402"]         # load_dotenv() must run before subcommand imports

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
