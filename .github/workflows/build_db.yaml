name: Build DuckDB

on:
  workflow_dispatch:
  schedule:
    # Run daily at 09:00 UTC (after ETL extraction at 05:00 and parquet consolidation at 07:00)
    - cron: '0 9 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
      PYTHONUNBUFFERED: 1

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync

      - name: Build DuckDB
        run: uv run build_db.py --upload

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: omicidx-duckdb
          path: |
            omicidx.duckdb
            omicidx.metadata.json
          retention-days: 7
