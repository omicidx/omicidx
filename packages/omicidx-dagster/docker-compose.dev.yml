# Development mode - bind mount source code for live reload
#
# Usage:
#   docker compose -f docker-compose.dev.yml build  # build once
#   docker compose -f docker-compose.dev.yml up     # start with bind mounts
#
# Changes to Python files in src/ will be picked up by Dagster's gRPC server
# without rebuilding the image. Dagster automatically reloads code on changes.

services:
  omicidx-dagster-dev:
    build:
      context: ../..
      dockerfile: packages/omicidx-dagster/Dockerfile
    container_name: omicidx-dagster-dev
    networks:
      - dagster_dagster
      - pg_and_duckdb_default
    environment:
      DAGSTER_CURRENT_IMAGE: omicidx-dagster-dev
      # PostgreSQL Configuration (required for run execution)
      DAGSTER_POSTGRES_USER: ${DAGSTER_POSTGRES_USER:-dagster}
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD}
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB:-dagster}
      DAGSTER_POSTGRES_HOSTNAME: ${DAGSTER_POSTGRES_HOSTNAME:-pg_duckdb_18}
      DAGSTER_POSTGRES_PORT: ${DAGSTER_POSTGRES_PORT:-5432}
      # R2/S3 Storage Configuration
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_REGION: ${S3_REGION:-auto}
      S3_URL_STYLE: ${S3_URL_STYLE:-path}
      # OmicIDX publish root (default to local for dev)
      PUBLISH_ROOT: ${PUBLISH_ROOT:-/tmp/omicidx-dev}
      # PubMed sensor timeout
      DAGSTER_SENSOR_GRPC_TIMEOUT: "300"
      # Enable debug logging
      DAGSTER_LOG_LEVEL: ${DAGSTER_LOG_LEVEL:-INFO}
    volumes:
      # Bind mount source code for live reload
      - ./src/omicidx/dagster:/opt/dagster/workspace/packages/omicidx-dagster/src/omicidx/dagster
      # Also mount parsers source if you want to edit parsers too
      - ../omicidx-parsers/src/omicidx/parsers:/opt/dagster/workspace/packages/omicidx-parsers/src/omicidx/parsers
      # Mount .env if it exists (optional)
      - ./.env:/opt/dagster/workspace/packages/omicidx-dagster/.env:ro
    command:
      - dagster
      - code-server
      - start
      - -h
      - "0.0.0.0"
      - -p
      - "4000"
      - -m
      - omicidx.dagster.definitions
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 4000), timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

networks:
  dagster_dagster:
    external: true
  pg_and_duckdb_default:
    external: true
