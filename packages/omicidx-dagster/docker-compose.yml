# Production deployment - self-contained build
#
# Usage:
#   docker compose build
#   docker compose up -d
#
# This compose file is for standalone deployment of the omicidx-dagster code location.
# It does NOT include Dagster infrastructure (daemon, webserver, postgres).
# Use this to deploy the code location to an existing Dagster deployment.

services:
  omicidx-dagster:
    build:
      context: ../..
      dockerfile: packages/omicidx-dagster/Dockerfile
    container_name: omicidx-dagster
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      # R2/S3 Storage Configuration
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_REGION: ${S3_REGION:-auto}
      S3_URL_STYLE: ${S3_URL_STYLE:-path}
      # OmicIDX publish root
      PUBLISH_ROOT: ${PUBLISH_ROOT:-s3://omicidx}
      # PubMed sensor lists thousands of files; allow more time
      DAGSTER_SENSOR_GRPC_TIMEOUT: "300"
    command:
      - dagster
      - api
      - grpc
      - -h
      - "0.0.0.0"
      - -p
      - "4000"
      - -m
      - omicidx.dagster.definitions
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 4000), timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
