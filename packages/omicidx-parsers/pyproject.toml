[project]
name = "omicidx-parsers"
version = "1.17.0"
description = "Parsers for NCBI SRA, Biosample, and GEO metadata — part of the OmicIDX project"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Sean Davis", email = "seandavi@gmail.com" },
]
keywords = ["genomics", "bioinformatics", "open data", "SRA", "GEO", "biosample"]
dependencies = [
    "requests>=2.22",
    "click",
    "tenacity>=8.0.1",
    "httpx",
    "pydantic>=2",
    "biopython>=1.81",
    "orjson>=3.9.2",
    "universal-pathlib",
]

[project.urls]
Homepage = "https://github.com/omicidx/omicidx"
Repository = "https://github.com/omicidx/omicidx"
Issues = "https://github.com/omicidx/omicidx/issues"

[project.optional-dependencies]
dev = [
    "mypy>=1.4.1",
    "pytest>=7.4.0",
    "lazydocs>=0.4.8",
]

[project.scripts]
omicidx_tool = "omicidx.parsers.scripts.geo:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/omicidx"]
